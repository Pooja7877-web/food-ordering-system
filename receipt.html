<!DOCTYPE html>
<html>
<head>
  <title>Order Receipt</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    .box {
      background: white;
      width: 300px;
      margin: 50px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #e23744;
    }

    button {
      background: #e23744;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>🎉 Order Successful</h2>
    <p>Your order has been placed!</p>

    <h3>Total Paid: ₹<span id="finalTotal">0</span></h3>

    <button onclick="goBack()">Back to Menu</button>
  </div>

  <script>
    // Total show karega
    let total = localStorage.getItem("totalAmount");
    document.getElementById("finalTotal").innerText = total;

    function goBack() {
      window.location.href = "menu.html";
    }
  </script>

</body>
</html>
