<!DOCTYPE html>
<html>
<head>
  <title>Order History</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    .order-box {
      background: white;
      width: 300px;
      margin: 20px auto;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #e23744;
    }
  </style>
</head>
<body>

<h2>📜 Order History</h2>

<div id="history"></div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];

let div = document.getElementById("history");

if (orders.length === 0) {
  div.innerHTML = "No orders yet 😢";
} else {
  orders.reverse().forEach(order => {

    let box = document.createElement("div");
    box.className = "order-box";

    let html = "<h3>🧾 Order</h3>";
    html += "<p><b>Date:</b> " + order.date + "</p>";
    html += "<ul>";

    order.items.forEach(item => {
      html += "<li>" + item.item + " - ₹" + item.price + "</li>";
    });

    html += "</ul>";
    html += "<b>Total: ₹" + order.total + "</b>";

    box.innerHTML = html;
    div.appendChild(box);
  });
}
</script>

</body>
</html>
