<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    .box {
      background: white;
      width: 350px;
      margin: 20px auto;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
      text-align: left;
    }

    h2 {
      color: red;
    }

    button {
      padding: 8px;
      background: red;
      color: white;
      border: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>📊 Admin Panel</h2>

<div id="orders"></div>

<button onclick="clearAll()">🗑 Clear All Orders</button>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let container = document.getElementById("orders");

if(orders.length === 0){
  container.innerHTML = "<h3>No Orders Found</h3>";
} else {

  orders.forEach((order, index) => {

    let box = document.createElement("div");
    box.className = "box";

    let html = `
      <h3>Order ${index + 1}</h3>
      <p><b>Date:</b> ${order.date}</p>
      <p><b>Payment:</b> ${order.payment}</p>

      <p><b>Customer:</b><br>
      ${order.customer.name}<br>
      ${order.customer.address}<br>
      ${order.customer.phone}</p>

      <p><b>Items:</b></p>
      <ul>
        ${order.items.map(i => `<li>${i.item} - ₹${i.price}</li>`).join("")}
      </ul>

      <p><b>Total:</b> ₹${order.total}</p>

      <hr>
    `;

    box.innerHTML = html;
    container.appendChild(box);

  });

}

function clearAll(){
  localStorage.removeItem("orders");
  alert("All orders deleted!");
  location.reload();
}

</script>

</body>
</html>
